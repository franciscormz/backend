<!DOCTYPE html>
<html>

<head>
  <title>Chat Socket.IO</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
  <style>
    #lista {
      background-color: rgb(191, 193, 194);
      margin-top: 20px;
    }

    #titulo {
      font-size: larger;
    }

    .espacio {
      margin-top: 30px;
    }
  </style>
</head>

<body>
  <div class="row">
    <div class="col-xs-12 col-sm-12 col-md-12 col-lg-12">
      <label id="titulo">Mensajes en línea.</label>
    </div>
  </div>
  <div class="row espacio">
    <div class="col-xs-12 col-sm-12 col-md-4 col-lg-4">
      <input type="text" class="form-control" id="inputMsg" placeholder="Escribe tu mensaje..." />
    </div>
    <div class="col-xs-12 col-sm-12 col-md-4 col-lg-4">
      <button class="btn btn-success" onclick="enviar()">Enviar</button>
    </div>
  </div>
  <div class="row">
    <div class="col-xs-12 col-sm-12 col-md-4 col-lg-4" id="lista">
      <ul id="mensajes"></ul>
    </div>
  </div>

</body>

<script src="/socket.io/socket.io.js"></script>
<script src="https://code.jquery.com" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
  crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
  integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>

<script>
  const socket = io();

  socket.on('mensaje', (msg) => {
    const li = document.createElement('li');
    li.textContent = msg;
    document.getElementById('mensajes').appendChild(li);
  });

  function enviar() {
    const text = document.getElementById('inputMsg').value;
    socket.emit('mensaje', text);
    document.getElementById('inputMsg').value = '';
  }
</script>

</html>
