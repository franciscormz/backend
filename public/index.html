<!DOCTYPE html>
<html>

<head>
  <title>Chat Socket.IO</title>
  <script src="/socket.io/socket.io.js"></script>
  <script src="https://code.jquery.com" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous"></script>

</head>

<body>
  <input id="inputMsg" placeholder="Escribe tu mensaje..." />
  <button onclick="enviar()">Enviar</button>

  <ul id="mensajes"></ul>

  <script>
    const socket = io();

    socket.on('mensaje', (msg) => {
      const li = document.createElement('li');
      li.textContent = msg;
      document.getElementById('mensajes').appendChild(li);
    });

    function enviar() {
      const text = document.getElementById('inputMsg').value;
      socket.emit('mensaje', text);
      document.getElementById('inputMsg').value = '';
    }
  </script>
</body>

</html>
